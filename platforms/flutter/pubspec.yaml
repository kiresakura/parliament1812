name: parliament_1812
description: 1812 國會風雲 - 議會辯論 RPG 社交推理遊戲
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 狀態管理 - Riverpod
  flutter_riverpod: ^2.4.0

  # 路由
  go_router: ^12.0.0

  # WebSocket / Socket.IO
  socket_io_client: ^2.0.0

  # HTTP 請求
  http: ^1.1.0
  dio: ^5.4.0

  # 字體
  google_fonts: ^6.1.0

  # 工具
  uuid: ^4.2.1
  intl: ^0.18.1

  # 本地儲存
  shared_preferences: ^2.2.2

  # UI 元件
  flutter_spinkit: ^5.2.0
  animated_text_kit: ^4.2.2
  flutter_countdown_timer: ^4.1.0

  # 動畫
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # 圖示
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/splash/
    - assets/images/web/
    - assets/images/characters/
    - assets/sounds/
    - assets/animations/
