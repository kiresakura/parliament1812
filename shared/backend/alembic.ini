# Parliament 1812 Alembic 配置

[alembic]
# 遷移腳本路徑
script_location = alembic

# 模板
prepend_sys_path = .

# 版本路徑
version_path_separator = os

# 輸出編碼
output_encoding = utf-8

# 資料庫 URL（從環境變數讀取）
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
