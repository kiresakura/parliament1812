name: parliament_1812
description: 1812 國會風雲 - 角色扮演遊戲
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 狀態管理
  provider: ^6.1.1
  # HTTP 請求
  http: ^1.1.0
  dio: ^5.4.0
  # WebSocket
  web_socket_channel: ^2.4.0
  # NFC
  nfc_manager: ^3.3.0
  # 本地儲存
  shared_preferences: ^2.2.2
  # UI 元件
  flutter_spinkit: ^5.2.0
  animated_text_kit: ^4.2.2
  flutter_countdown_timer: ^4.1.0
  # 字體
  google_fonts: ^6.1.0
  # 音效
  just_audio: ^0.9.40
  # 動畫
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  # 震動回饋
  vibration: ^2.0.0
  # 工具
  uuid: ^4.2.1
  intl: ^0.18.1
  # 圖示
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/splash/
    - assets/images/web/
    - assets/images/characters/
    - assets/sounds/
    - assets/animations/
